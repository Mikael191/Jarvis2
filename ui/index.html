<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <meta http-equiv="Content-Security-Policy"
        content="script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline';">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100vw;
            height: 100vh;
            background: #000000;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }

        /* Invisible close zone in the corner */
        #close {
            position: fixed;
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            z-index: 999;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        /*
            Entire canvas glow is done via CSS drop-shadow.
            This is GPU-accelerated compositing → zero extra draw calls.
        */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            transition: filter 0.8s ease-in-out;
            filter: drop-shadow(0 0 18px rgba(0, 212, 255, 0.45)) drop-shadow(0 0 40px rgba(0, 80, 255, 0.2));
        }

        body.listening canvas {
            filter: drop-shadow(0 0 22px rgba(0, 255, 140, 0.55)) drop-shadow(0 0 50px rgba(0, 180, 100, 0.2));
        }

        body.thinking canvas {
            filter: drop-shadow(0 0 22px rgba(255, 160, 0, 0.60)) drop-shadow(0 0 50px rgba(255, 60, 0, 0.25));
        }

        body.speaking canvas {
            filter: drop-shadow(0 0 30px rgba(0, 230, 255, 0.80)) drop-shadow(0 0 70px rgba(0, 100, 255, 0.40));
        }
    </style>
</head>

<body>
    <div id="close" onclick="window.close && window.close()"></div>

    <!-- Three.js r128 – lightweight, well-supported, no bundler needed -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="renderer.js"></script>
</body>

</html>
